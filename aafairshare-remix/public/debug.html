<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAFairShare Debug Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #3B82F6;
      border-bottom: 2px solid #3B82F6;
      padding-bottom: 10px;
    }
    .card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    .error {
      background-color: #FEF2F2;
      border-left: 4px solid #EF4444;
      padding: 10px 15px;
      margin-bottom: 10px;
    }
    button {
      background-color: #3B82F6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #2563EB;
    }
    pre {
      background-color: #F3F4F6;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>AAFairShare Debug Page</h1>
  
  <div class="card">
    <h2>Environment Information</h2>
    <div id="env-info"></div>
  </div>
  
  <div class="card">
    <h2>Browser Information</h2>
    <div id="browser-info"></div>
  </div>
  
  <div class="card">
    <h2>Test Actions</h2>
    <button id="test-firebase">Test Firebase</button>
    <button id="test-router">Test Router</button>
    <button id="clear-cache">Clear Cache</button>
  </div>
  
  <div class="card">
    <h2>Console Output</h2>
    <div id="console-output"></div>
  </div>

  <script>
    // Helper function to log to both console and page
    function log(message, isError = false) {
      console.log(message);
      const output = document.getElementById('console-output');
      const entry = document.createElement('div');
      if (isError) {
        entry.className = 'error';
      }
      entry.textContent = typeof message === 'object' ? JSON.stringify(message, null, 2) : message;
      output.appendChild(entry);
    }

    // Display environment info
    function showEnvInfo() {
      const envInfo = document.getElementById('env-info');
      try {
        const info = `
          <p><strong>Window ENV:</strong> ${window.ENV ? 'Available' : 'Not available'}</p>
          <p><strong>Firebase:</strong> ${window.firebase ? 'Available' : 'Not available'}</p>
          <p><strong>Location:</strong> ${window.location.href}</p>
        `;
        envInfo.innerHTML = info;
      } catch (error) {
        envInfo.innerHTML = `<div class="error">Error getting environment info: ${error.message}</div>`;
      }
    }

    // Display browser info
    function showBrowserInfo() {
      const browserInfo = document.getElementById('browser-info');
      try {
        const info = `
          <p><strong>User Agent:</strong> ${navigator.userAgent}</p>
          <p><strong>Platform:</strong> ${navigator.platform}</p>
          <p><strong>Language:</strong> ${navigator.language}</p>
          <p><strong>Cookies Enabled:</strong> ${navigator.cookieEnabled}</p>
          <p><strong>Online:</strong> ${navigator.onLine}</p>
        `;
        browserInfo.innerHTML = info;
      } catch (error) {
        browserInfo.innerHTML = `<div class="error">Error getting browser info: ${error.message}</div>`;
      }
    }

    // Test Firebase
    document.getElementById('test-firebase').addEventListener('click', function() {
      try {
        if (window.firebase) {
          log('Firebase is available');
          log(`Firebase version: ${window.firebase.SDK_VERSION || 'Unknown'}`);
        } else {
          log('Firebase is not available', true);
        }
      } catch (error) {
        log(`Firebase test error: ${error.message}`, true);
      }
    });

    // Test Router
    document.getElementById('test-router').addEventListener('click', function() {
      try {
        // Check if we can access the router
        if (window.__remixRouter) {
          log('Remix Router is available');
          log(`Router state: ${JSON.stringify(window.__remixRouter.state)}`);
        } else {
          log('Remix Router is not available', true);
        }
      } catch (error) {
        log(`Router test error: ${error.message}`, true);
      }
    });

    // Clear Cache
    document.getElementById('clear-cache').addEventListener('click', function() {
      try {
        // Clear localStorage
        localStorage.clear();
        
        // Clear sessionStorage
        sessionStorage.clear();
        
        // Clear caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name);
            }
          });
        }
        
        log('Cache cleared successfully');
      } catch (error) {
        log(`Clear cache error: ${error.message}`, true);
      }
    });

    // Initialize
    window.onload = function() {
      showEnvInfo();
      showBrowserInfo();
      log('Debug page loaded');
    };
  </script>
</body>
</html>
