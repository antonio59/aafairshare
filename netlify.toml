[build]
  command = """
    echo "Starting build process with error handling..." && 
    SKIP_NODE_CHECK=true npm ci && 
    echo "Installing dependencies completed" && 
    npm run build:netlify-functions && 
    echo "TypeScript compilation completed" && 
    npx vite build && 
    echo "Vite build completed successfully"
  """
  publish = "dist"
  functions = "netlify/functions-dist"

[build.environment]
  NODE_VERSION = "20.10.0"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_USE_YARN = "false"
  NETLIFY_IGNORE_ENGINES = "false"
  SKIP_NODE_CHECK = "true"
  PATH = "/opt/build/repo/node_modules/.bin:$PATH"
  # Skip non-essential steps in production build
  SKIP_TESTS = "true"
  SKIP_SENTRY = "true"
  CI = "true"

# Use our custom build plugin
[[plugins]]
  package = "./netlify/functions-dist/netlify-build-plugin"

# Production context: all deploys from the Production branch set in your site's
# deploy contexts will inherit these settings.
[context.production]
  environment = { NODE_ENV = "production" }

# Redirects and rewrites
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers to set security headers
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://ccwcbnfnvkmwubkuvzns.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://ccwcbnfnvkmwubkuvzns.supabase.co https://api.exchangerate-api.com; frame-ancestors 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"