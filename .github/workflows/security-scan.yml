name: Security Scan

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  security-events: write
  issues: write
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install -g npm@latest npm-check-updates snyk
          npm install --legacy-peer-deps

      - name: Run Security Scans
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Run Snyk scan
          snyk test --json > snyk-results.json || true
          # Run npm audit
          npm audit --json > npm-audit.json || true
          # Check for updates
          ncu --format json > updates.json || true

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Build Project
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: Create Security Report
        if: always()
        run: |
          echo "## Security Scan Results" > report.md
          
          echo "### Snyk Security Results" >> report.md
          if [ -f snyk-results.json ]; then
            echo '```json' >> report.md
            cat snyk-results.json >> report.md
            echo '```' >> report.md
          fi
          
          echo "### NPM Audit Results" >> report.md
          if [ -f npm-audit.json ]; then
            echo '```json' >> report.md
            cat npm-audit.json >> report.md
            echo '```' >> report.md
          fi
          
          echo "### Dependencies Update Check" >> report.md
          if [ -f updates.json ]; then
            echo '```json' >> report.md
            cat updates.json >> report.md
            echo '```' >> report.md
          fi

      - name: Create Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security Scan Report - ${today}`,
              body: report,
              labels: ['security', 'automated']
            });
