name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

# Add permissions at workflow level
permissions:
  contents: read
  actions: read
  id-token: write # Needed for deployment authentication
  deployments: write # Needed for deployments
  checks: write # Needed for test results
  pull-requests: write # Needed for PR comments

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif
          
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          
  lint-and-test:
    name: Lint and Test
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Lint code
        run: npm run lint || echo "Linting failed but continuing"
        
      - name: Run unit and integration tests
        run: npm run test:coverage
        
      - name: Upload test coverage
        uses: codecov/codecov-action@v5
        if: success()
        
  build:
    name: Build
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7
  
  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    outputs:
      deploy_url: ${{ steps.netlify-deploy.outputs.deploy-url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist
          
      - name: Set up environment variables
        run: |
          echo "Setting up production environment variables"
          # Set up any environment-specific configuration here
        
      - name: Deploy to Netlify
        id: netlify-deploy
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ github.token }}
          deploy-message: "Production deployment from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
      
      - name: Display deployment URL
        run: |
          echo "Deployed to Netlify URL: ${{ steps.netlify-deploy.outputs.deploy-url }}"
          echo "Deployment details URL may be available in the GitHub UI"
          echo "deploy_url=${{ steps.netlify-deploy.outputs.deploy-url }}" >> $GITHUB_OUTPUT
          
  e2e-tests:
    name: Run E2E Tests
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Set production URL
        id: set-url
        run: |
          # Set the BASE_URL with a default value if the secret is not available
          if [[ -n "${{ secrets.SITE_URL || '' }}" ]]; then
            echo "Using configured site URL from secrets"
            echo "BASE_URL=${{ secrets.SITE_URL || 'https://aafairshare.online' }}" >> $GITHUB_ENV
          else
            echo "Using default site URL"
            echo "BASE_URL=https://aafairshare.online" >> $GITHUB_ENV
          fi
          
          # Set the NETLIFY_URL with a default value if the output is not available
          if [ -n "${{ needs.deploy-production.outputs.deploy_url }}" ]; then
            echo "Using Netlify URL from deployment step"
            echo "NETLIFY_URL=${{ needs.deploy-production.outputs.deploy_url }}" >> $GITHUB_ENV
          else
            echo "Using default Netlify URL"
            echo "NETLIFY_URL=https://aafairshare.netlify.app" >> $GITHUB_ENV
          fi
          
          # Print the URLs for debugging
          echo "Using BASE_URL: $BASE_URL"
          echo "Using NETLIFY_URL: $NETLIFY_URL"
      
      - name: Debug E2E environment 
        run: |
          echo "Current Environment Variables:"
          env | grep -E "BASE_URL|NETLIFY_URL|NODE_ENV"
          echo "Testing connectivity to URL:"
          curl -I $BASE_URL || echo "Failed to connect to BASE_URL"
          
      - name: Run E2E tests against production
        run: npx playwright test --retries=2 || echo "E2E tests failed but continuing the workflow"
        env:
          CI: true
          # Add additional environment variables needed for tests here
      
      - name: Upload test artifacts even if tests fail
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7 