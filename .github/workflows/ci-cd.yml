name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

# Add permissions at workflow level
permissions:
  contents: read
  actions: read
  id-token: write # Needed for deployment authentication
  deployments: write # Needed for deployments
  checks: write # Needed for test results
  pull-requests: write # Needed for PR comments
  security-events: write # Needed for security scan results

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --sarif-file-output=snyk.sarif
          command: test
          
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Upload even if Snyk test fails
        with:
          sarif_file: snyk.sarif
          category: Snyk
          wait-for-processing: true
          
  lint-and-test:
    name: Lint and Test
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
        
      - name: Run unit and integration tests
        run: npm run test:coverage
        
      - name: Upload test coverage
        uses: codecov/codecov-action@v5
        if: success()
        
  build:
    name: Build
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Tests
        run: npm run test:ci
        env:
          NODE_ENV: test
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7
  
  lighthouse:
    name: Lighthouse Performance Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          
      - name: Restore Lighthouse cache
        uses: actions/cache@v4
        with:
          path: |
            lighthouse-reports
            .lighthouseci
          key: lighthouse-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package.json') }}
          restore-keys: |
            lighthouse-cache-${{ runner.os }}-${{ runner.arch }}-
            
      - name: Run Lighthouse tests
        run: |
          npx serve dist -p 3000 &
          sleep 5
          npm run test:performance -- --url=http://localhost:3000
          kill $(lsof -t -i:3000)
          
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 30
  
  deploy-production:
    name: Deploy to Production
    needs: [build, lighthouse]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    outputs:
      deploy_url: ${{ steps.vercel-deploy.outputs.preview-url }}
    environment:
      name: production
      url: ${{ steps.vercel-deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Sentry to get commit data
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        
      - name: Deploy to Vercel
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
          
      - name: Create Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: 'antonio59'
          SENTRY_PROJECT: 'aafairshare'
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          NODE_ENV: 'production'
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./package.json').version")
          
          # Create release
          npx @sentry/cli releases new v$VERSION
          
          # Associate commits with the release
          npx @sentry/cli releases set-commits v$VERSION --auto
          
          # Upload source maps
          npx @sentry/cli releases files v$VERSION upload-sourcemaps ./dist --rewrite
          
          # Finalize the release
          npx @sentry/cli releases finalize v$VERSION
          
          # Create deployment
          npx @sentry/cli releases deploys v$VERSION new -e production
      
      - name: Display deployment URL
        run: |
          echo "Deployed to Vercel URL: ${{ steps.vercel-deploy.outputs.preview-url }}"
          echo "deploy_url=${{ steps.vercel-deploy.outputs.preview-url }}" >> $GITHUB_OUTPUT
          
  e2e-tests:
    name: Run E2E Tests
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Set test URLs
        id: set-url
        run: |
          echo "BASE_URL=https://aafairshare.online" >> $GITHUB_ENV
          echo "PREVIEW_URL=${{ needs.deploy-production.outputs.deploy_url }}" >> $GITHUB_ENV
      
      - name: Debug test environment 
        run: |
          echo "Current Environment Variables:"
          env | grep -E "BASE_URL|PREVIEW_URL|NODE_ENV"
          echo "Testing connectivity to production URL:"
          curl -I $BASE_URL || echo "Failed to connect to BASE_URL"
          
      - name: Run E2E tests
        run: npx playwright test --retries=2
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
      
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7