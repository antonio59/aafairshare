name: Snyk Basic Test

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: read

jobs:
  snyk-basic-test:
    name: Basic Snyk Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Install and test Snyk CLI
        id: snyk-cli-test
        run: |
          # Install Snyk CLI directly
          npm install -g snyk
          
          # Check CLI version
          echo "Snyk CLI version:"
          snyk --version
          
          # Test Snyk token status
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "SNYK_TOKEN is available"
            echo "SNYK_TOKEN_AVAILABLE=true" >> $GITHUB_OUTPUT
          else
            echo "SNYK_TOKEN is not set"
            echo "SNYK_TOKEN_AVAILABLE=false" >> $GITHUB_OUTPUT
          fi
          
          # Try to authenticate (will fail if token is not valid)
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "Attempting to authenticate with Snyk"
            snyk auth ${{ secrets.SNYK_TOKEN }} || echo "Authentication failed with exit code $?"
          fi
          
          # Run a basic test
          echo "Running basic Snyk test (will likely show vulnerabilities but shouldn't fail the build)"
          snyk test --json || echo "Snyk test exited with code $?" 