name: Security Scan & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Mondays

permissions:
  contents: read
  security-events: write
  deployments: write
  id-token: write
  actions: read
  checks: write

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: 20.10.0
  SHELL: /bin/bash

jobs:
  security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --sarif-file-output=snyk.sarif
          command: test
          json: true

      - name: Validate SARIF file
        run: |
          if [ ! -f "snyk.sarif" ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' > snyk.sarif
          fi
          echo "SARIF file exists: $(ls -l snyk.sarif)"

      - name: Upload security results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  netlify-deploy:
    name: Netlify Deployment
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup build environment
        run: |
          mkdir -p dist netlify/functions-dist playwright-report test-results
          touch netlify/functions-dist/.keep
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          SHELL: /bin/bash

      - name: Build project
        run: npm run build
        env:
          SHELL: /bin/bash

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deployment from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
          enable-commit-status: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5 