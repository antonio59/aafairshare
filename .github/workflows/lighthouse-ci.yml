name: Lighthouse CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Add permissions at workflow level
permissions:
  contents: read
  pull-requests: write # Needed for commenting results

jobs:
  lighthouse:
    name: Lighthouse Performance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Update to latest LTS
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production # Ensure production build
      
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::No 'dist' directory found after build!"
            echo "Check your build script and the build output directory name"
            exit 1
          else
            echo "✅ Build directory found:"
            ls -la dist
            echo "Total files: $(find dist -type f | wc -l)"
          fi
      
      - name: Install serve package
        run: npm install -g serve
      
      - name: Start server in the background
        run: npx serve dist -p 8080 &
      
      - name: Wait for server to start
        run: |
          echo "Waiting for server to start..."
          sleep 5
          
          # Verify the server is responding
          if curl -s -f http://localhost:8080/ > /dev/null; then
            echo "✅ Server is running at http://localhost:8080/"
          else
            echo "::warning::Server is not responding, waiting longer..."
            sleep 10
            if curl -s -f http://localhost:8080/ > /dev/null; then
              echo "✅ Server is running after extended wait"
            else
              echo "::error::Server failed to start or respond"
              echo "Proceeding with tests but they may fail"
            fi
          fi
      
      - name: Check if Lighthouse token exists
        id: check-token
        run: |
          if [ -n "${{ secrets.LHCI_GITHUB_APP_TOKEN }}" ]; then
            echo "HAS_LHCI_TOKEN=true" >> $GITHUB_OUTPUT
            echo "✅ LHCI_GITHUB_APP_TOKEN is configured"
          else
            echo "HAS_LHCI_TOKEN=false" >> $GITHUB_OUTPUT
            echo "⚠️ LHCI_GITHUB_APP_TOKEN is not set, will run without GitHub integration"
          fi
      
      - name: Run Lighthouse CI (with token)
        id: lighthouse-with-token
        if: steps.check-token.outputs.HAS_LHCI_TOKEN == 'true'
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          configPath: './lighthouse-config.json'
          urls: |
            http://localhost:8080/
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      
      - name: Run Lighthouse CI (without token)
        id: lighthouse-without-token
        if: steps.check-token.outputs.HAS_LHCI_TOKEN != 'true'
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          configPath: './lighthouse-config.json'
          urls: |
            http://localhost:8080/
          uploadArtifacts: true
          temporaryPublicStorage: true
      
      - name: Process Lighthouse results
        run: |
          if [ "${{ steps.check-token.outputs.HAS_LHCI_TOKEN }}" == "true" ]; then
            if [ "${{ steps.lighthouse-with-token.outcome }}" == "success" ]; then
              echo "✅ Lighthouse tests completed successfully"
            else
              echo "⚠️ Lighthouse tests completed with warnings or failures"
              echo "But the workflow will continue - check the artifacts for details"
            fi
          else
            if [ "${{ steps.lighthouse-without-token.outcome }}" == "success" ]; then
              echo "✅ Lighthouse tests completed successfully (without GitHub integration)"
            else
              echo "⚠️ Lighthouse tests completed with warnings or failures"
              echo "But the workflow will continue - check the artifacts for details"
            fi
          fi
          
          echo "You can see full test results in the uploaded artifacts or temporary storage"
          exit 0  # Always exit successfully to prevent workflow failure 