name: "CodeQL Analysis"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 0'  # Run at 3 AM UTC on Sundays

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'typescript' ] # Keep only typescript

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Use latest major version

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3 # Update to v3
      with:
        languages: ${{ matrix.language }}

    - name: Setup Node.js
      uses: actions/setup-node@v4 # Use latest major version
      with:
        node-version: '20' # Match other workflows

    # Install pnpm
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
        run_install: false

    # Get pnpm store directory
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    # Setup pnpm cache
    - uses: actions/cache@v3
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # Install dependencies
    - name: Install dependencies
      run: pnpm install

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3 # Update to v3
      with:
        category: "/language:${{matrix.language}}"
