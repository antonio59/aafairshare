name: "CodeQL Analysis"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 0'  # Run at 3 AM UTC on Sundays

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'typescript' ] # Keep only typescript

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3 # Update to v3
      with:
        languages: ${{ matrix.language }}

    - name: Setup Node.js
      uses: actions/setup-node@v3 # Correct indentation
      with: # Correct indentation
        node-version: '18'
        cache: 'npm' # Restore cache

    - name: Install dependencies (clean) # Correct indentation
      run: |
        rm -f package-lock.json
        npm install # Use install after removing lockfile

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3 # Update to v3
      with:
        category: "/language:${{matrix.language}}"
