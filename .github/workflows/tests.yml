name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3 # Correct indentation
        with: # Correct indentation
          node-version: '20'
          cache: 'npm' # Restore cache

      - name: Install dependencies (clean & force public registry) # Correct indentation
        run: |
          npm config set registry https://registry.npmjs.org/
          npm cache clean --force
          rm -f package-lock.json
          npm install # Use install after removing lockfile

      - name: Run tests
        run: npm test

