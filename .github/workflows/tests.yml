name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3 # Correct indentation
        with: # Correct indentation
          node-version: '20'
          # cache: 'npm' # Removed cache

      - name: Install dependencies (clean) # Correct indentation
        run: |
          rm -f package-lock.json
          npm install # Use install after removing lockfile

      - name: Run tests
        run: npm test

      - name: Generate test coverage report
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4 # Update to v4
        with:
          name: coverage-report
          path: coverage/
