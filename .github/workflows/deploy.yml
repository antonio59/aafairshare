name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '18'

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Run tests
        run: npm test
      
      - name: Deploy to staging
        if: ${{ github.event.inputs.environment == 'staging' || github.event.inputs.environment == null }}
        run: |
          echo "Deploying to staging environment"
          # Replace with your staging deployment commands
          # For example:
          # - Upload to AWS S3 + CloudFront
          # - Deploy to Vercel or Netlify
          # - Deploy to a staging server via SSH
      
      - name: Deploy to production
        if: ${{ github.event.inputs.environment == 'production' }}
        run: |
          echo "Deploying to production environment"
          # Replace with your production deployment commands
          # For example:
          # - Upload to AWS S3 + CloudFront
          # - Deploy to Vercel or Netlify
          # - Deploy to a production server via SSH
      
      - name: Notify deployment status
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: Deployment to ${{ github.event.inputs.environment || 'staging' }}
          SLACK_MESSAGE: 'Application deployed to ${{ github.event.inputs.environment || "staging" }} :rocket:'
          SLACK_FOOTER: 'Household Expenses Management App'