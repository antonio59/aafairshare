name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: # Explicitly set path (though '.' is default)
          path: '.'

      - name: Verify checkout directory and list files
        run: |
          pwd
          ls -la

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Correct indentation
        with: # Correct indentation
          node-version: '20' # Use Node.js version 20 or match your project's requirement
          cache: 'npm' # Restore cache

      - name: Install dependencies (clean & force public registry) # Correct indentation
        run: |
          npm config set registry https://registry.npmjs.org/
          npm cache clean --force
          rm -f package-lock.json
          npm install # Use install after removing lockfile

      # - name: List files before build # Removed this ls step
      #   run: ls -la

      - name: Build project
        run: npm run build
        env:
          CI: false # Sometimes needed if build treats warnings as errors

      - name: List files before deploy # Add step to list files for debugging
        run: ls -la

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AAFAIRSHARE_37271 }}' # Use the specific service account secret if available
          channelId: live # Deploy to the live channel
          projectId: aafairshare-firebase # Replace with your Firebase project ID if different
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels # Enable hosting channels feature if needed
