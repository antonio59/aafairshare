name: Snyk Security Scan

on:
  workflow_dispatch:  # Allow manual triggering from GitHub UI
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1' # Run every Monday at 8:00 AM

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test --json-file-output=snyk-results.json
          args: --severity-threshold=high
      
      - name: Generate SARIF from Snyk JSON
        if: always()
        run: |
          echo "Creating SARIF directory"
          mkdir -p sarif
          
          echo "Installing Snyk SARIF converter"
          npm install -g @snyk/snyk-to-sarif
          
          echo "Converting Snyk JSON to SARIF"
          if [ -f "snyk-results.json" ]; then
            snyk-to-sarif -i snyk-results.json -o sarif/snyk-results.sarif
            echo "SARIF file generated at sarif/snyk-results.sarif"
            ls -la sarif/
          else
            echo "snyk-results.json not found. Cannot generate SARIF."
            exit 1
          fi
      
      - name: Upload Snyk scan results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sarif/snyk-results.sarif
          category: snyk 