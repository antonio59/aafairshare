name: Snyk Security Scan

on:
  workflow_dispatch:  # Allow manual triggering from GitHub UI
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1' # Run every Monday at 8:00 AM

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          # Make sure this secret is properly added to your repository settings
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-results.sarif
      
      - name: Debug SARIF file
        run: |
          echo "Checking for SARIF file"
          ls -la
          find . -name "*.sarif" || echo "No SARIF files found"
      
      - name: Upload Snyk scan results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-results.sarif
          category: snyk
        if: always() # This ensures the workflow continues even if previous steps fail 