name: Snyk Security Scan

on:
  workflow_dispatch:  # Allow manual triggering from GitHub UI
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1' # Run every Monday at 8:00 AM

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Debug - List workspace before Snyk scan
        run: |
          echo "Current directory contents:"
          ls -la
      
      - name: Run Snyk to check for vulnerabilities
        id: snyk-test
        uses: snyk/actions/node@master
        continue-on-error: true  # Don't fail the workflow if vulnerabilities are found
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test --json-file-output=snyk-results.json
          args: --severity-threshold=high
      
      - name: Debug - Check if Snyk test completed
        run: |
          echo "Snyk test exit code: ${{ steps.snyk-test.outcome }}"
          echo "Current directory contents after Snyk test:"
          ls -la
          
          if [ -f "snyk-results.json" ]; then
            echo "snyk-results.json file exists with size:"
            ls -la snyk-results.json
            echo "First 100 characters of file:"
            head -c 100 snyk-results.json
          else
            echo "snyk-results.json file does not exist!"
            echo "FILE_EXISTS=false" >> $GITHUB_ENV
          fi
      
      - name: Create empty SARIF file if Snyk failed
        if: steps.snyk-test.outcome != 'success'
        run: |
          if [ ! -f "snyk-results.json" ]; then
            echo "Creating empty SARIF file since Snyk test failed"
            mkdir -p sarif
            echo '{
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "Snyk",
                      "informationUri": "https://snyk.io",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }' > sarif/snyk-results.sarif
          fi
      
      - name: Generate SARIF from Snyk JSON
        if: always()
        id: generate-sarif
        run: |
          # Check if JSON file exists
          if [ ! -f "snyk-results.json" ]; then
            echo "snyk-results.json file does not exist! Skipping SARIF generation."
            # Create empty SARIF file
            mkdir -p sarif
            echo '{
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "Snyk",
                      "informationUri": "https://snyk.io",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }' > sarif/snyk-results.sarif
            exit 0
          fi
          
          echo "Creating SARIF directory"
          mkdir -p sarif
          
          echo "Installing Snyk SARIF converter"
          npm install -g @snyk/snyk-to-sarif
          
          echo "Converting Snyk JSON to SARIF"
          cat snyk-results.json | npx snyk-to-sarif > sarif/snyk-results.sarif
          
          # Check if conversion was successful
          if [ -f "sarif/snyk-results.sarif" ]; then
            echo "SARIF file generated at sarif/snyk-results.sarif"
            ls -la sarif/
            echo "SARIF file size:"
            ls -la sarif/snyk-results.sarif
            echo "First 100 characters of SARIF file:"
            head -c 100 sarif/snyk-results.sarif
          else
            echo "SARIF file generation failed."
            
            # Create empty SARIF file to prevent workflow failure
            echo '{
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "Snyk",
                      "informationUri": "https://snyk.io",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }' > sarif/snyk-results.sarif
          fi
      
      - name: Debug - List SARIF directory
        if: always()
        run: |
          echo "SARIF directory contents:"
          mkdir -p sarif
          ls -la sarif/
      
      - name: Upload Snyk scan results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sarif/snyk-results.sarif
          category: snyk 