name: Snyk Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Run every Monday at midnight

jobs:
  security:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3 # Correct indentation
        with: # Correct indentation
          node-version: '20'
          # cache: 'npm' # Removed cache

      - name: Install dependencies (clean) # Correct indentation
        run: |
          rm -f package-lock.json
          npm install # Use install after removing lockfile

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master # Try @master instead of @v1

      - name: Run Snyk test
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} # Env var for the CLI command
