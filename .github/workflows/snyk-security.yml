name: Snyk Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'  # Run every Monday at 8:00 AM
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  snyk-scan:
    name: Snyk Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Run Snyk scan
        uses: snyk/actions/node@master
        continue-on-error: true  # Continue even if vulnerabilities are found
        env:
          # Optional: If SNYK_TOKEN is not set, we'll just warn but not fail
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # Second step - create a "fixed" SARIF file for GitHub Code Scanning
      - name: Run Snyk to check for vulnerabilities and create GitHub Code Scanning SARIF report
        uses: snyk/actions/node@master
        continue-on-error: true  # Continue even if vulnerabilities are found or action fails
        with:
          command: test
          args: --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          
      # Create minimal SARIF file if Snyk failed to produce one
      - name: Create minimal SARIF file if needed
        id: check-sarif
        run: |
          if [ -f "snyk.sarif" ]; then
            echo "✅ SARIF file was created by Snyk"
            ls -la snyk.sarif
          else
            echo "⚠️ Creating minimal SARIF file as fallback"
            echo '{
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "Snyk",
                      "informationUri": "https://snyk.io",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }' > snyk.sarif
          fi
          
      - name: Upload SARIF file to GitHub
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk.sarif
          category: snyk
          
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sarif
          path: snyk.sarif
          retention-days: 5 