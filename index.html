<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AAFairShare - Expense sharing made simple" />
    <meta name="theme-color" content="#F9FAFB" />
    
    <!-- Prevent browsers from requesting favicon -->
    <link rel="icon" href="data:,">
    
    <!-- PWA support -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>AAFairShare</title>
    <style>
      /* Critical CSS to prevent FOUC */
      html, body {
        min-height: 100vh;
        margin: 0;
        padding: 0;
        background-color: #F9FAFB;
      }
      #root {
        min-height: 100vh;
        background-color: #F9FAFB;
        display: flex;
        flex-direction: column;
      }
      .loading {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #F9FAFB;
        z-index: 9999;
      }
      #root:empty + .loading {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loading::after {
        content: '';
        width: 48px;
        height: 48px;
        border: 2px solid #2563EB;
        border-radius: 50%;
        border-left-color: transparent;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="h-full">
    <div id="root"></div>
    <div class="loading" role="status" aria-label="Loading..."></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
