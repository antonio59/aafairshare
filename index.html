<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AAFairShare - Expense sharing made simple" />
    <meta name="theme-color" content="#F9FAFB" />
    
    <!-- Base URL for GitHub Codespaces -->
    <base href="/" />
    
    <!-- Prevent browsers from requesting favicon -->
    <link rel="icon" href="data:,">
    
    <!-- PWA support -->
    <link rel="manifest" crossorigin="use-credentials" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./favicon.ico" />
    
    <!-- Preconnect to important domains -->
    <link rel="preconnect" href="https://storage.googleapis.com">
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
    
    <title>AAFairShare</title>
    <style>
      /* Critical CSS to prevent FOUC */
      html, body {
        min-height: 100vh;
        margin: 0;
        padding: 0;
        background-color: #F9FAFB;
      }
      #root {
        min-height: 100vh;
        background-color: #F9FAFB;
        display: flex;
        flex-direction: column;
      }
      .loading {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #F9FAFB;
        z-index: 9999;
      }
      #root:empty + .loading {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loading::after {
        content: '';
        width: 48px;
        height: 48px;
        border: 2px solid #2563EB;
        border-radius: 50%;
        border-left-color: transparent;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <!-- Prevent FOUC -->
    <script>
      // Hide content until styles are loaded
      document.documentElement.style.visibility = 'hidden';
      window.addEventListener('load', function() {
        document.documentElement.style.visibility = '';
      });
    </script>
  </head>
  <body class="h-full">
    <div id="root"></div>
    <div class="loading" role="status" aria-label="Loading..."></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="padding: 2rem; text-align: center;">
        Please enable JavaScript to use AAFairShare.
      </div>
    </noscript>
  </body>
</html>
